<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Hitter Pro - Control Center</title>
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #3b82f6;
            --accent: #22c55e;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #030712 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, transparent 0deg, var(--primary) 360deg);
            opacity: 0.05;
            animation: rotate 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            filter: brightness(1.1);
        }

        button:active { transform: translateY(0); }

        .status-panel {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 15px;
        }

        .status-header {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #logs {
            height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #cbd5e1;
        }

        .log-entry {
            margin-bottom: 6px;
            padding-left: 10px;
            border-left: 2px solid var(--primary);
        }

        .log-entry.success { border-color: var(--accent); color: #4ade80; }
        .log-entry.error { border-color: #ef4444; color: #f87171; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">AUTO HITTER PRO</div>
            <div class="subtitle">Next-Gen Automation Engine</div>
        </header>

        <form id="hitForm">
            <div class="input-group">
                <label>Checkout URL</label>
                <input type="text" id="targetUrl" placeholder="https://buy.stripe.com/..." required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Card BIN</label>
                    <input type="number" id="bin" placeholder="e.g. 539983" required>
                </div>
                <div class="input-group">
                    <label>Attempts</label>
                    <select id="tries">
                        <option value="1">1 Try</option>
                        <option value="5">5 Tries</option>
                        <option value="10" selected>10 Tries</option>
                        <option value="25">25 Tries</option>
                        <option value="50">50 Tries</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="startBtn">START AUTOMATION</button>
        </form>

        <div class="status-panel">
            <div class="status-header">
                <span>Live Status Board</span>
                <div class="live-dot" id="statusDot" style="display:none;"></div>
            </div>
            <div id="logs">
                <div class="log-entry">Waiting for session...</div>
            </div>
        </div>
    </div>
    <script src="/static/miniapp.js"></script>
</body>
</html>
